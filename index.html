<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCET 2026 Study Tracker</title>
    
    <script src="tracker_data.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // PULLING DATA FROM tracker_data.js
        const { CS_STRATEGY, ROUTINES, PHASES, QUIZ_DATABASE } = window;

        // --- ICONS ---
        const TargetIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const ZapIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const ClockIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const CalendarIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const CheckCircleIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const CheckSquareIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>;
        const XIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const XCircleIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;

           function App() {
            // --- 1. SUPABASE CLOUD SETUP ---
            const supabaseUrl = 'https://pzqegtitfxhlmjspzfaj.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6cWVndGl0ZnhobG1qc3B6ZmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MDIsImV4cCI6MjA5MjcwNzkwMn0.kO-uzSMH4_cgxmyLGoNDzl6oGPAkz-Whc2cAh9TTaGc';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            
            const userEmail = localStorage.getItem('dcet_user');

           // --- 2. DOWNLOAD PROGRESS WHEN APP LOADS ---
            useEffect(() => {
                if (!userEmail) {
                    window.location.href = 'login.html'; 
                    return;
                }

                async function fetchCloudData() {
                    try {
                        const { data, error } = await supabase
                            .from('test_users')
                            .select('progress, name') // <--- Getting progress AND name!
                            .eq('email', userEmail)
                            .single();

                        if (data) {
                            // 1. Save the Name!
                            if (data.name) setUserName(data.name);

                            // 2. Load the Progress!
                            if (data.progress) {
                                if (data.progress.tasks) {
                                    // Load Combo Package
                                    setCompletedTasks(data.progress.tasks);
                                    setQuizHistory(data.progress.quizzes || {}); 
                                    localStorage.setItem('dcet_quiz_history', JSON.stringify(data.progress.quizzes || {}));
                                } else {
                                    // Fallback
                                    setCompletedTasks(data.progress);
                                }
                            } else {
                                // BRAND NEW USER
                                setCompletedTasks([]);
                                setQuizHistory({});
                            }
                        } // <--- This was the missing bracket!
                    } catch (err) {
                        console.error("Error fetching cloud data:", err);
                    }
                }
                
                fetchCloudData();
            }, []);

            // --- 3. UPLOAD ENGINE (Pushes data to Supabase) ---
            async function syncToCloud(latestData) {
                if (!userEmail) return;
                try {
                    const { data, error } = await supabase
                        .from('test_users')
                        .update({ progress: latestData })
                        .eq('email', userEmail)
                        .select(); // Forces Supabase to confirm the save

                    if (error) {
                        console.error("SUPABASE ERROR: ", error.message);
                    } else if (data.length === 0) {
                        alert(`CRITICAL BUG: Supabase cannot find this exact email in your database: "${userEmail}". Please logout and register again.`);
                    } else {
                        console.log("☁️ Successfully backed up to the cloud!");
                    }
                } catch (err) {
                    console.error("☁️ Failed to sync to cloud:", err);
                }
            }

            const [activeTab, setActiveTab] = useState('overview');
            const [userName, setUserName] = useState(''); // <--- Added this to hold the name!
            
            const [completedTasks, setCompletedTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem('dcet_completed_tasks_v2');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            const [quizHistory, setQuizHistory] = useState(() => {
                try { return JSON.parse(localStorage.getItem('dcet_quiz_history')) || {}; } 
                catch(e) { return {}; }
            });

            const [quizModal, setQuizModal] = useState({ isOpen: false, dayId: null });
            const [quizAnswers, setQuizAnswers] = useState({});
            const [quizSubmitted, setQuizSubmitted] = useState(false);

           useEffect(() => {
                try {
                    localStorage.setItem('dcet_completed_tasks_v2', JSON.stringify(completedTasks));
                } catch(e) {}
            }, [completedTasks]);
           const handleLogout = () => {
                // Wipe EVERYTHING when you log out!
                localStorage.removeItem('dcet_user');
                localStorage.removeItem('dcet_completed_tasks_v2');
                localStorage.removeItem('dcet_quiz_history');
                window.location.href = 'login.html';
            };

            const toggleTask = (taskId) => {
                // 1. Force it to be a clean array (prevents the crash!)
                const currentTasks = Array.isArray(completedTasks) ? completedTasks : [];
                
                // 2. Create the updated list
                const newTasks = currentTasks.includes(taskId) 
                    ? currentTasks.filter(id => id !== taskId) 
                    : [...currentTasks, taskId];
                
                // 3. Update the screen
                setCompletedTasks(newTasks);
                
                // 4. Safely push to the cloud
                try {
                    const history = JSON.parse(localStorage.getItem('dcet_quiz_history')) || {};
                    syncToCloud({ tasks: newTasks, quizzes: history });
                } catch (e) {
                    console.error("Cloud sync failed", e);
                }
            };

            const calculateProgress = () => {
                let total = 0;
                if (!window.PHASES) return 0; // Safety check
                
                window.PHASES.forEach(p => p.days.forEach(d => total += d.tasks.length));
                
                // Safely count the tasks to prevent math crashes
                const safeTasks = Array.isArray(completedTasks) ? completedTasks : [];
                return Math.round((safeTasks.length / total) * 100) || 0;
            };

            const openQuiz = (dayId) => {
                setQuizModal({ isOpen: true, dayId });
                
                // 1. Check if we already took this quiz in the past
                const history = JSON.parse(localStorage.getItem('dcet_quiz_history')) || {};
                
                if (history[dayId]) {
                    // Load old answers!
                    setQuizAnswers(history[dayId].answers);
                    setQuizSubmitted(history[dayId].submitted);
                } else {
                    // Start fresh
                    setQuizAnswers({});
                    setQuizSubmitted(false);
                }
            };

            const handleQuizAnswer = (qId, optionIdx) => {
                if (!quizSubmitted) {
                    setQuizAnswers(prev => ({...prev, [qId]: optionIdx}));
                }
            };

            const submitQuiz = () => {
                setQuizSubmitted(true);
                
                // 2. Save the score locally
                const history = JSON.parse(localStorage.getItem('dcet_quiz_history')) || {};
                history[quizModal.dayId] = { answers: quizAnswers, submitted: true };
                localStorage.setItem('dcet_quiz_history', JSON.stringify(history));
                setQuizHistory(history); // <--- Updates the screen!
                
                // 3. Immediately push the new grade to the cloud!
                syncToCloud({ tasks: completedTasks, quizzes: history });
            };

            // Safety check for the database
            if (!PHASES || !QUIZ_DATABASE) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="bg-white p-8 rounded-xl shadow-md border border-red-200 text-center">
                            <h2 className="text-2xl font-bold text-red-600 mb-2">Database Missing</h2>
                            <p>Please ensure <code>tracker_data.js</code> is saved in the same folder.</p>
                        </div>
                    </div>
                );
            }

            const renderQuizModal = () => {
                if (!quizModal.isOpen || !quizModal.dayId || !QUIZ_DATABASE[quizModal.dayId]) return null;
                
                const quizData = QUIZ_DATABASE[quizModal.dayId];
                const totalQ = quizData.questions.length;
                const score = quizSubmitted ? quizData.questions.filter(q => quizAnswers[q.id] === q.correctAnswer).length : 0;

                return (
                    <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div className="bg-slate-50 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden shadow-2xl border border-slate-200">
                            <div className="flex justify-between items-center p-5 border-b bg-white border-slate-200 shrink-0">
                                <h2 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                                    <ZapIcon className="text-amber-500 w-6 h-6" />
                                    {quizData.title}
                                </h2>
                                <button onClick={() => setQuizModal({ isOpen: false, dayId: null })} className="text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors">
                                    <XIcon className="w-5 h-5" />
                                </button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                                {quizSubmitted && (
                                    <div className={`p-6 rounded-xl border-2 text-center relative overflow-hidden ${score >= totalQ * 0.7 ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-rose-50 border-rose-200 text-rose-800'}`}>
                                        <div className="text-4xl font-black mb-1">{score} / {totalQ}</div>
                                        <div className="font-semibold">{score >= totalQ * 0.7 ? 'Great job! You\'re on track.' : 'Review the concepts and try again.'}</div>
                                    </div>
                                )}

                                {quizData.questions.map((q, idx) => (
                                    <div key={q.id} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm relative">
                                        <div className="absolute -left-2 -top-2 w-6 h-6 bg-slate-800 text-white text-xs font-bold flex items-center justify-center rounded shadow-sm">{idx + 1}</div>
                                        <p className="font-bold text-slate-800 mb-4 ml-2">{q.text}</p>
                                        <div className="space-y-2">
                                            {q.options.map((opt, oIdx) => {
                                                const isSelected = quizAnswers[q.id] === oIdx;
                                                const isCorrect = oIdx === q.correctAnswer;
                                                let btnClass = "border-slate-200 text-slate-600 hover:bg-slate-50";
                                                
                                                if (quizSubmitted) {
                                                    if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 text-emerald-800 font-semibold ring-1 ring-emerald-500";
                                                    else if (isSelected && !isCorrect) btnClass = "border-rose-300 bg-rose-50 text-rose-800";
                                                    else btnClass = "border-slate-100 opacity-50";
                                                } else if (isSelected) {
                                                    btnClass = "border-indigo-400 bg-indigo-50 text-indigo-800 font-semibold ring-1 ring-indigo-400";
                                                }

                                                return (
                                                    <button key={oIdx} onClick={() => handleQuizAnswer(q.id, oIdx)} disabled={quizSubmitted}
                                                        className={`w-full text-left p-3 rounded-lg border-2 transition-all flex items-start gap-3 ${btnClass}`}>
                                                        <div className="mt-0.5 flex-shrink-0">
                                                            {quizSubmitted && isCorrect && <CheckCircleIcon className="w-5 h-5 text-emerald-600" />}
                                                            {quizSubmitted && isSelected && !isCorrect && <XCircleIcon className="w-5 h-5 text-rose-500" />}
                                                            {!quizSubmitted && <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${isSelected ? 'border-indigo-500' : 'border-slate-300'}`}>{isSelected && <div className="w-2 h-2 rounded-full bg-indigo-500" />}</div>}
                                                        </div>
                                                        <span className="text-sm">{opt}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        {quizSubmitted && (
                                            <div className={`mt-4 p-3 rounded-lg text-sm border ${quizAnswers[q.id] === q.correctAnswer ? 'bg-emerald-50/50 border-emerald-100' : 'bg-slate-50 border-slate-200'}`}>
                                                <span className="font-bold block mb-1">Explanation:</span> {q.explanation}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="p-5 border-t bg-white border-slate-200 shrink-0 flex justify-between items-center">
                                <div className="text-sm font-medium text-slate-500">
                                    {Object.keys(quizAnswers).length} of {totalQ} answered
                                </div>
                                {!quizSubmitted ? (
                                    <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length !== totalQ}
                                        className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-6 py-2.5 rounded-lg font-bold transition-colors">
                                        Submit Quiz
                                    </button>
                                ) : (
                                    <button onClick={() => setQuizModal({ isOpen: false, dayId: null })} className="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2.5 rounded-lg font-bold transition-colors">
                                        Close
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-20">
                 
                    
                  {/* 📱 Mobile: Tiny Icon | 💻 Laptop: Original Big Button */}
                    <div className="fixed top-3 right-3 z-50">
                        <button 
                            onClick={handleLogout} 
                            className="bg-rose-500 hover:bg-rose-600 text-white font-bold 
                                       py-2 px-2 sm:py-2 sm:px-5 
                                       rounded-xl shadow-lg transition-all flex items-center gap-2 
                                       border border-white/20 group"
                        >
                            <svg 
                                width="20" height="20" 
                                className="sm:w-5 sm:h-5" 
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                            >
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            
                            {/* Uses "sm:block" to completely hide the text on phones */}
                            <span className="hidden sm:block text-sm uppercase tracking-wide">
                                Logout
                            </span>
                        </button>
                    </div>
                    <header className="bg-indigo-900 text-white sticky top-0 z-20 shadow-md">
                        <div className="max-w-4xl mx-auto px-4 py-4">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h1 className="text-2xl font-bold flex items-center gap-2">
                                        <TargetIcon className="text-indigo-300" />
                                        DCET 2026 Tracker
                                    </h1>
                                    {/* The Welcome Message is dynamically inserted here! */}
                                    <p className="text-indigo-200 text-sm mt-1">
                                        Welcome back, <span className="font-bold text-white">{userName || 'Student'}</span>! • Target: 100 Marks
                                    </p>
                                </div>
                                <div className="text-right hidden sm:block">
                                    <div className="text-sm text-indigo-200">Exam Date</div>
                                    <div className="font-bold">May 23, 2026</div>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1 font-medium text-indigo-200">
                                    <span>Overall Progress</span>
                                    <span>{calculateProgress()}%</span>
                                </div>
                                <div className="w-full bg-indigo-950 rounded-full h-2.5">
                                    <div className="bg-emerald-400 h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${calculateProgress()}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex overflow-x-auto border-t border-indigo-800 bg-indigo-950/50 backdrop-blur-sm items-center" style={{scrollbarWidth: 'none'}}>
                            <div className="max-w-4xl mx-auto flex w-full items-center">
                                <button onClick={() => setActiveTab('overview')} className={`flex-1 py-3 px-4 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${activeTab === 'overview' ? 'border-emerald-400 text-emerald-300 bg-indigo-900/50' : 'border-transparent text-indigo-300 hover:text-white'}`}>
                                    Overview
                                </button>
                                {PHASES.map(phase => (
                                    <button key={phase.id} onClick={() => setActiveTab(phase.id)} className={`flex-1 py-3 px-4 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${activeTab === phase.id ? 'border-emerald-400 text-emerald-300 bg-indigo-900/50' : 'border-transparent text-indigo-300 hover:text-white'}`}>
                                        {phase.title.split(':')[0]}
                                    </button>
                                ))}
                                
                                {/* LINK TO NEW PRACTICE UI */}
                                <a href="practice.html" className="flex items-center justify-center px-3 py-1 my-2 mx-2 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-white text-[10px] font-bold shadow-sm transition-all shrink-0 uppercase tracking-wider">
                                    📝 Mastery
                                </a>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 py-8">
                        {activeTab === 'overview' && (
                            <div className="space-y-8">
                                <section>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <ZapIcon className="text-amber-500 w-5 h-5" />
                                        Phase 0: CS Strategic Analysis
                                    </h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {CS_STRATEGY.map((item, idx) => (
                                            <div key={idx} className={`p-4 rounded-xl border ${item.color} shadow-sm bg-opacity-50`}>
                                                <div className="text-xs font-bold uppercase tracking-wider mb-1 opacity-80">{item.level}</div>
                                                <div className="font-semibold text-lg">{item.label}</div>
                                                <div className="mt-2 text-sm opacity-90">{item.subjects}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                                <section>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <ClockIcon className="text-indigo-500 w-5 h-5" />
                                        Daily Routine Habits
                                    </h2>
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                <tr>
                                                    <th className="px-4 py-3 font-semibold">Time Block</th>
                                                    <th className="px-4 py-3 font-semibold">Weekday</th>
                                                    <th className="px-4 py-3 font-semibold">Weekend</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {ROUTINES.map((routine, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50/50">
                                                        <td className="px-4 py-3 font-medium text-slate-800">{routine.time}</td>
                                                        <td className="px-4 py-3">{routine.weekday}</td>
                                                        <td className="px-4 py-3">{routine.weekend}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}

                        {PHASES.map(phase => activeTab === phase.id && (
                            <div key={phase.id} className="space-y-6">
                                <div className="mb-6">
                                    <h2 className="text-2xl font-bold text-slate-800">{phase.title}</h2>
                                    <p className="text-slate-500 flex items-center gap-2 mt-1">
                                        <CalendarIcon className="w-4 h-4" /> {phase.dates}
                                    </p>
                                </div>
                                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                    {phase.days.map((day) => {
                                        const dayKey = `${phase.id}-d${day.day}`;
                                        const hasQuiz = !!QUIZ_DATABASE[dayKey];
                                        
                                        // 1. Are all checkboxes ticked?
                                        const areTasksDone = day.tasks.length > 0 && day.tasks.every((_, i) => completedTasks.includes(`${dayKey}-t${i}`));
                                        
                                        // 2. If it has a quiz, is it submitted? (If no quiz exists, it automatically passes)
                                        const isQuizDone = hasQuiz ? (quizHistory[dayKey] && quizHistory[dayKey].submitted) : true;
                                        
                                        // 3. The box ONLY turns green if BOTH are true!
                                        const isAllChecked = areTasksDone && isQuizDone;
                                        
                                        return (
                                            <div key={day.day} className={`bg-white rounded-xl shadow-sm border p-5 transition-all duration-200 ${isAllChecked ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200 hover:border-indigo-300'}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <div className="font-bold text-lg text-slate-800">Day {day.day}</div>
                                                        <div className="text-sm text-slate-500">{day.date}</div>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-2">
                                                        {isAllChecked && <CheckCircleIcon className="text-emerald-500 w-6 h-6" />}
                                                        {hasQuiz && (
                                                            <button onClick={() => openQuiz(`${phase.id}-d${day.day}`)} className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200 transition-colors uppercase">
                                                                Daily Quiz
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="space-y-3">
                                                    {day.tasks.map((task, idx) => {
                                                        const taskId = `${phase.id}-d${day.day}-t${idx}`;
                                                        return (
                                                            <label key={taskId} className="flex items-start gap-3 cursor-pointer group">
                                                                <button onClick={(e) => { e.preventDefault(); toggleTask(taskId); }} className="mt-0.5 flex-shrink-0 focus:outline-none">
                                                                    {completedTasks.includes(taskId) ? <CheckSquareIcon className="w-5 h-5 text-emerald-500" /> : <div className="w-5 h-5 border-2 border-slate-300 rounded bg-white group-hover:border-indigo-400 transition-colors" />}
                                                                </button>
                                                                <span className={`text-sm leading-tight pt-0.5 transition-all ${completedTasks.includes(taskId) ? 'line-through text-slate-500' : 'text-slate-700 font-medium group-hover:text-indigo-900'}`}>{task}</span>
                                                            </label>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>
                    
                    {renderQuizModal()}
                    
                    <div className="fixed bottom-0 w-full text-center py-3 bg-slate-100/80 backdrop-blur text-[10px] text-slate-400 border-t border-slate-200 z-10 font-bold uppercase tracking-tighter">
                        ☁️ Securely Synced to Cloud Database
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
