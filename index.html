                    { id: 14, text: 'The "Triple Constraint" in project management refers to:', options: ['Time, Cost, and Scope', 'People, Process, and Tools', 'Planning, Execution, and Review', 'Quality, Risk, and Rewards'], correctAnswer: 0, explanation: 'If you change Time, Cost, or Scope, at least one of the other two must also change.' },
                    { id: 15, text: 'Who is a "Stakeholder" in a project?', options: ['Only the project manager', 'Only the people paying for the project', 'Anyone who is affected by or can affect the project', 'Only the government'], correctAnswer: 2, explanation: 'Stakeholders include the team, customers, sponsors, and even the local community.' },
                    { id: 16, text: 'What is the very first phase in a standard Project Life Cycle?', options: ['Planning', 'Execution', 'Closure', 'Initiation'], correctAnswer: 3, explanation: 'Initiation is where the project is defined at a high level and authorized.' },
                    { id: 17, text: '"Scope Creep" refers to:', options: ['A project finishing early', 'Uncontrolled changes or continuous growth in a project\'s scope', 'A team member leaving', 'Reducing the budget'], correctAnswer: 1, explanation: 'Scope creep happens when new features are added without adjusting time or cost.' },
                    { id: 18, text: 'Which of these is a crucial "Soft Skill" for a Project Manager?', options: ['Advanced coding', 'Effective Communication', 'Operating heavy machinery', 'Complex calculus'], correctAnswer: 1, explanation: 'PMs spend up to 90% of their time communicating with stakeholders and team members.' },
                    { id: 19, text: 'A "Deliverable" in project management is:', options: ['A tangible or intangible good/service produced as a result of the project', 'A delivery truck', 'A project delay', 'A cost estimate'], correctAnswer: 0, explanation: 'Deliverables are the actual outputs (like a software module or a physical report).' },
                    { id: 20, text: 'What is the main difference between Projects and Operations?', options: ['Operations are temporary, Projects are ongoing', 'Projects are temporary and unique, Operations are ongoing and repetitive', 'They are exactly the same', 'Operations cost more money'], correctAnswer: 1, explanation: 'Operations sustain the business daily, while projects drive change and uniqueness.' }
                ]
            }
        };

        // --- LOCAL BROWSER STORAGE (LOCALSTORAGE) ---
        const saveToLocal = (key, data) => {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) { console.error("Local storage saving error:", e); }
        };

        const loadFromLocal = (key) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : null;
            } catch (e) { return null; }
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('overview');
            const [user, setUser] = useState(null);
            const [firebaseInstance, setFirebaseInstance] = useState(null);
            
            // Core Data
            const [completedTasks, setCompletedTasks] = useState([]);
            const [quizStates, setQuizStates] = useState({});
            
            // Modal state
            const [activeQuizId, setActiveQuizId] = useState(null);

            // Connect to Cloud Database
            useEffect(() => {
                let unsubscribeSnapshot;
                let unsubscribeAuth;

                const initFirebase = async () => {
                    try {
                        if (typeof __firebase_config !== 'undefined') {
                            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                            const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                            const { getFirestore, doc, setDoc, onSnapshot } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

                            const firebaseConfig = JSON.parse(__firebase_config);
                            const app = initializeApp(firebaseConfig);
                            const auth = getAuth(app);
                            const db = getFirestore(app);
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                            setFirebaseInstance({ db, auth, appId, doc, setDoc });

                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }

                            unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                                setUser(currentUser);
                                if (currentUser) {
                                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'progress', 'tasks_v2');
                                    unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                                        if (docSnap.exists()) {
                                            const data = docSnap.data();
                                            setCompletedTasks(data.completedIds || []);
                                            setQuizStates(data.quizStates || {});
                                        }
                                    }, (error) => console.error("Snapshot error:", error));
                                }
                            });
                        } else {
                            throw new Error("Offline Mode");
                        }
                    } catch (err) {
                        console.log("Running offline. Loading saved data from local browser memory...");
                        const savedTasks = loadFromLocal('dcet_tasks');
                        const savedQuizzes = loadFromLocal('dcet_quizzes');
                        if (savedTasks) setCompletedTasks(savedTasks);
                        if (savedQuizzes) setQuizStates(savedQuizzes);
                    }
                };

                initFirebase();

                return () => {
                    if (unsubscribeAuth) unsubscribeAuth();
                    if (unsubscribeSnapshot) unsubscribeSnapshot();
                };
            }, []);

            // Checkmark logic
            const toggleTask = async (taskId) => {
                let newTasks;
                if (completedTasks.includes(taskId)) {
                    newTasks = completedTasks.filter(id => id !== taskId);
                } else {
                    newTasks = [...completedTasks, taskId];
                }
                setCompletedTasks(newTasks);
                saveToLocal('dcet_tasks', newTasks);
                
                if (firebaseInstance && user) {
                    try {
                        const { db, appId, doc, setDoc } = firebaseInstance;
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', 'tasks_v2');
                        await setDoc(docRef, { completedIds: newTasks }, { merge: true });
                    } catch(err) { }
                }
            };

            // Quiz logic
            const openQuiz = (quizId) => setActiveQuizId(quizId);
            const closeQuiz = () => setActiveQuizId(null);

            const handleAnswerSelect = async (questionId, optionIndex) => {
                const currentQuizState = quizStates[activeQuizId] || { answers: {}, submitted: false };
                if (!currentQuizState.submitted) {
                    const newAnswers = { ...currentQuizState.answers, [questionId]: optionIndex };
                    const newQuizStates = { ...quizStates, [activeQuizId]: { ...currentQuizState, answers: newAnswers } };
                    setQuizStates(newQuizStates); 
                    saveToLocal('dcet_quizzes', newQuizStates);

                    if (firebaseInstance && user) {
                        try {
                            const { db, appId, doc, setDoc } = firebaseInstance;
                            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', 'tasks_v2');
                            await setDoc(docRef, { quizStates: newQuizStates }, { merge: true });
                        } catch(err) { }
                    }
                }
            };

            const submitQuiz = async () => {
                const currentQuizState = quizStates[activeQuizId] || { answers: {}, submitted: false };
                const newQuizStates = { ...quizStates, [activeQuizId]: { ...currentQuizState, submitted: true } };
                setQuizStates(newQuizStates);
                saveToLocal('dcet_quizzes', newQuizStates);

                if (firebaseInstance && user) {
                    try {
                        const { db, appId, doc, setDoc } = firebaseInstance;
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'progress', 'tasks_v2');
                        await setDoc(docRef, { quizStates: newQuizStates }, { merge: true });
                    } catch(err) { }
                }
            };

            const calculateProgress = () => {
                const totalTasks = PHASES.reduce((acc, phase) => acc + phase.days.reduce((dayAcc, day) => dayAcc + day.tasks.length, 0), 0);
                if (totalTasks === 0) return 0;
                return Math.round((completedTasks.length / totalTasks) * 100) || 0;
            };

            // Quiz Modal Render
            const renderQuizModal = () => {
                if (!activeQuizId) return null;
                const quizData = QUIZ_DATABASE[activeQuizId];

                if (!quizData) {
                    return (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-lg p-6 relative">
                                <button onClick={closeQuiz} className="absolute top-4 right-4 text-slate-400 hover:text-slate-700">
                                    <XIcon size={24} />
                                </button>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">Quiz Coming Soon!</h3>
                                <p className="text-slate-600">The MCQs for this day have not been generated yet. Complete Days 1-3 first!</p>
                                <button onClick={closeQuiz} className="mt-6 w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
                                    Close
                                </button>
                            </div>
                        </div>
                    );
                }

                const currentQuizState = quizStates[activeQuizId] || { answers: {}, submitted: false };
                const userAnswers = currentQuizState.answers;
                const quizSubmitted = currentQuizState.submitted;

                let score = 0;
                if (quizSubmitted) {
                    quizData.questions.forEach(q => { if (userAnswers[q.id] === q.correctAnswer) score++; });
                }

                return (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4">
                        <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
                            <div className="p-4 sm:p-6 border-b border-slate-200 flex justify-between items-center bg-indigo-50 rounded-t-2xl">
                                <div>
                                    <h3 className="text-xl font-bold text-indigo-900">{quizData.title}</h3>
                                    {quizSubmitted && (
                                        <p className={`text-sm font-bold mt-1 ${score > (quizData.questions.length/2) ? 'text-emerald-600' : 'text-amber-600'}`}>
                                            Final Score: {score} / {quizData.questions.length}
                                        </p>
                                    )}
                                </div>
                                <button onClick={closeQuiz} className="text-indigo-400 hover:text-indigo-700 transition">
                                    <XIcon size={24} />
                                </button>
                            </div>

                            <div className="overflow-y-auto p-4 sm:p-6 space-y-8">
                                {quizData.questions.map((q, qIndex) => (
                                    <div key={q.id} className="space-y-3">
                                        <p className="font-semibold text-slate-800">
                                            <span className="text-indigo-600 mr-2">{qIndex + 1}.</span>
                                            {q.text}
                                        </p>
                                        <div className="space-y-2 pl-6">
                                            {q.options.map((option, optIdx) => {
                                                const isSelected = userAnswers[q.id] === optIdx;
                                                const isCorrect = optIdx === q.correctAnswer;
                                                let optionStyle = "border-slate-200 hover:border-indigo-300 text-slate-700 bg-white";
                                                
                                                if (quizSubmitted) {
                                                    if (isCorrect) optionStyle = "border-emerald-500 bg-emerald-50 text-emerald-800";
                                                    else if (isSelected && !isCorrect) optionStyle = "border-red-400 bg-red-50 text-red-800";
                                                    else optionStyle = "border-slate-200 opacity-50 bg-slate-50";
                                                } else if (isSelected) {
                                                    optionStyle = "border-indigo-500 bg-indigo-50 text-indigo-800 ring-1 ring-indigo-500";
                                                }

                                                return (
                                                    <button
                                                        key={optIdx}
                                                        onClick={() => handleAnswerSelect(q.id, optIdx)}
                                                        disabled={quizSubmitted}
                                                        className={`w-full text-left p-3 rounded-lg border transition-all flex items-start gap-3 ${optionStyle}`}
                                                    >
                                                        <div className="mt-0.5 flex-shrink-0">
                                                            {quizSubmitted && isCorrect && <CheckIcon size={18} className="text-emerald-500" />}
                                                            {quizSubmitted && isSelected && !isCorrect && <XCircleIcon size={18} className="text-red-500" />}
                                                            {!quizSubmitted && <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${isSelected ? 'border-indigo-500' : 'border-slate-300'}`}>
                                                                {isSelected && <div className="w-2 h-2 bg-indigo-500 rounded-full" />}
                                                            </div>}
                                                        </div>
                                                        <span className="text-sm">{option}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        
                                        {quizSubmitted && (
                                            <div className="pl-6 mt-2">
                                                <div className={`p-3 rounded-lg text-sm ${userAnswers[q.id] === q.correctAnswer ? 'bg-emerald-50 text-emerald-800' : 'bg-slate-100 text-slate-700'}`}>
                                                    <strong>Explanation:</strong> {q.explanation}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="p-4 sm:p-6 border-t border-slate-200 bg-slate-50 rounded-b-2xl flex justify-end">
                                {!quizSubmitted ? (
                                    <button 
                                        onClick={submitQuiz}
                                        disabled={Object.keys(userAnswers).length !== quizData.questions.length}
                                        className="bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
                                    >
                                        Submit Answers
                                    </button>
                                ) : (
                                    <button onClick={closeQuiz} className="bg-slate-800 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-slate-900 transition">
                                        Close & Return
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-20">
                    <header className="bg-indigo-900 text-white sticky top-0 z-20 shadow-md">
                        <div className="max-w-4xl mx-auto px-4 py-4">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h1 className="text-2xl font-bold flex items-center gap-2">
                                        <TargetIcon className="text-indigo-300" />
                                        DCET 2026 Tracker
                                    </h1>
                                    <p className="text-indigo-200 text-sm mt-1">CS Student Edition • Target: 100 Marks</p>
                                </div>
                                <div className="text-right hidden sm:block">
                                    <div className="text-sm text-indigo-200">Exam Date</div>
                                    <div className="font-bold">May 23, 2026</div>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1 font-medium text-indigo-200">
                                    <span>Overall Progress</span>
                                    <span>{calculateProgress()}%</span>
                                </div>
                                <div className="w-full bg-indigo-950 rounded-full h-2.5">
                                    <div className="bg-emerald-400 h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${calculateProgress()}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex overflow-x-auto border-t border-indigo-800 bg-indigo-950/50 backdrop-blur-sm" style={{scrollbarWidth: 'none'}}>
                            <div className="max-w-4xl mx-auto flex w-full">
                                <button onClick={() => setActiveTab('overview')} className={`flex-1 py-3 px-4 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${activeTab === 'overview' ? 'border-emerald-400 text-emerald-300 bg-indigo-900/50' : 'border-transparent text-indigo-300 hover:text-white'}`}>
                                    Overview & Routine
                                </button>
                                {PHASES.map(phase => (
                                    <button key={phase.id} onClick={() => setActiveTab(phase.id)} className={`flex-1 py-3 px-4 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${activeTab === phase.id ? 'border-emerald-400 text-emerald-300 bg-indigo-900/50' : 'border-transparent text-indigo-300 hover:text-white'}`}>
                                        {phase.title.split(':')[0]}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 py-8">
                        {activeTab === 'overview' && (
                            <div className="space-y-8">
                                <section>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <ZapIcon className="text-amber-500 w-5 h-5" />
                                        Phase 0: CS Strategic Analysis
                                    </h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {CS_STRATEGY.map((item, idx) => (
                                            <div key={idx} className={`p-4 rounded-xl border ${item.color} shadow-sm bg-opacity-50`}>
                                                <div className="text-xs font-bold uppercase tracking-wider mb-1 opacity-80">{item.level}</div>
                                                <div className="font-semibold text-lg">{item.label}</div>
                                                <div className="mt-2 text-sm opacity-90">{item.subjects}</div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                                <section>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <ClockIcon className="text-indigo-500 w-5 h-5" />
                                        Daily Routine Habits
                                    </h2>
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                    <tr>
                                                        <th className="px-4 py-3 font-semibold">Time Block</th>
                                                        <th className="px-4 py-3 font-semibold">Duration</th>
                                                        <th className="px-4 py-3 font-semibold">Weekday (4.5h)</th>
                                                        <th className="px-4 py-3 font-semibold">Weekend (7.5h)</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {ROUTINES.map((routine, idx) => (
                                                        <tr key={idx} className="hover:bg-slate-50/50">
                                                            <td className="px-4 py-3 font-medium text-slate-800">{routine.time}</td>
                                                            <td className="px-4 py-3 text-slate-500">{routine.duration}</td>
                                                            <td className="px-4 py-3">{routine.weekday}</td>
                                                            <td className="px-4 py-3">{routine.weekend}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {PHASES.map(phase => activeTab === phase.id && (
                            <div key={phase.id} className="space-y-6">
                                <div className="mb-6">
                                    <h2 className="text-2xl font-bold text-slate-800">{phase.title}</h2>
                                    <p className="text-slate-500 flex items-center gap-2 mt-1">
                                        <CalendarIcon className="w-4 h-4" /> {phase.dates}
                                    </p>
                                </div>
                                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                    {phase.days.map((day) => {
                                        const isAllChecked = day.tasks.length > 0 && day.tasks.every((_, i) => completedTasks.includes(`${phase.id}-d${day.day}-t${i}`));
                                        return (
                                            <div key={day.day} className={`bg-white rounded-xl shadow-sm border p-5 transition-all duration-200 ${isAllChecked ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200 hover:border-indigo-300'}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <div className="font-bold text-lg text-slate-800">Day {day.day}</div>
                                                        <div className="text-sm text-slate-500">{day.date}</div>
                                                    </div>
                                                    {isAllChecked && <CheckCircleIcon className="text-emerald-500 w-6 h-6" />}
                                                </div>
                                                <div className="space-y-3">
                                                    {day.tasks.map((task, idx) => {
                                                        const taskId = `${phase.id}-d${day.day}-t${idx}`;
                                                        const isChecked = completedTasks.includes(taskId);
                                                        const hasQuiz = task.includes('MCQ') || task.includes('Sectional');
                                                        const quizId = `${phase.id}-d${day.day}`;
                                                        const isQuizSubmitted = quizStates[quizId]?.submitted;
                                                        
                                                        return (
                                                            <div key={taskId} className="flex items-start justify-between group">
                                                                <label className={`flex items-start gap-3 cursor-pointer flex-1 ${isChecked ? 'opacity-60' : ''}`}>
                                                                    <button onClick={(e) => { e.preventDefault(); toggleTask(taskId); }} className="mt-0.5 flex-shrink-0 focus:outline-none">
                                                                        {isChecked ? <CheckSquareIcon className="w-5 h-5 text-emerald-500" /> : <div className="w-5 h-5 border-2 border-slate-300 rounded bg-white group-hover:border-indigo-400 transition-colors" />}
                                                                    </button>
                                                                    <span className={`text-sm leading-tight pt-0.5 transition-all ${isChecked ? 'line-through text-slate-500' : 'text-slate-700 font-medium group-hover:text-indigo-900'}`}>{task}</span>
                                                                </label>
                                                                {hasQuiz && (
                                                                    <button onClick={() => openQuiz(quizId)} className={`ml-2 p-1.5 rounded-md transition-colors shadow-sm flex-shrink-0 flex items-center gap-1 ${isQuizSubmitted ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'text-indigo-500 bg-indigo-50 hover:bg-indigo-100 hover:text-indigo-700'}`} title={isQuizSubmitted ? "Review Completed Quiz" : "Take Quiz"}>
                                                                        {isQuizSubmitted ? <CheckCircleIcon size={16} /> : <BookOpenIcon size={16} />}
                                                                        <span className="text-xs font-bold sm:hidden lg:inline">{isQuizSubmitted ? "Done" : "Quiz"}</span>
                                                                    </button>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                                {phase.id === 'phase3' && (
                                    <div className="mt-8 bg-amber-50 border border-amber-200 rounded-xl p-5 shadow-sm">
                                        <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2"><AlertCircleIcon className="w-5 h-5 text-amber-600" />The "Why Did I Miss It?" Protocol</h3>
                                        <ul className="space-y-2 text-sm text-amber-800">
                                            <li><span className="font-bold text-red-600">Type A (Gap):</span> Forgot formula. <ChevronRightIcon className="inline w-3 h-3"/> Rote memorize immediately.</li>
                                            <li><span className="font-bold text-yellow-600">Type B (Silly):</span> Calculation error. <ChevronRightIcon className="inline w-3 h-3"/> Slow down on algebra.</li>
                                            <li><span className="font-bold text-blue-600">Type C (Read):</span> Missed keywords. <ChevronRightIcon className="inline w-3 h-3"/> Highlight keywords.</li>
                                        </ul>
                                    </div>
                                )}
                            </div>
                        ))}
                    </main>
                    
                    {renderQuizModal()}
                    <div className="fixed bottom-0 w-full text-center py-3 bg-slate-100/80 backdrop-blur text-xs text-slate-500 border-t border-slate-200 z-10">
                        All progress and test scores are permanently saved!
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
