<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCET Tracker - Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SUPABASE SETUP ---
        const supabaseUrl = 'https://pzqegtitfxhlmjspzfaj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6cWVndGl0ZnhobG1qc3B6ZmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MDIsImV4cCI6MjA5MjcwNzkwMn0.kO-uzSMH4_cgxmyLGoNDzl6oGPAkz-Whc2cAh9TTaGc';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const TargetIcon = ({ className, size=24 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const MailIcon = ({ className, size=20 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const LockIcon = ({ className, size=20 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const UserIcon = ({ className, size=20 }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;

        function AuthApp() {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    if (isLogin) {
                        // ==========================================
                        // CUSTOM LOGIN: Search the test_users table
                        // ==========================================
                        const { data, error: searchError } = await supabase
                            .from('test_users')
                            .select('*')
                            .eq('email', formData.email)
                            .eq('password', formData.password)
                            .single(); // .single() means we only expect exactly one match

                        if (searchError || !data) {
                            throw new Error('Invalid email or password! Did you type it correctly?');
                        }

                        // Success! Save the user's email to the browser and redirect
                        localStorage.setItem('dcet_user', data.email);
                        window.location.href = 'index.html';

                    } else {
                        // ==========================================
                        // CUSTOM REGISTER: Insert directly into test_users
                        // ==========================================
                        
                        // First, check if the email is already in the database
                        const { data: existingUser } = await supabase
                            .from('test_users')
                            .select('email')
                            .eq('email', formData.email)
                            .single();

                        if (existingUser) {
                            throw new Error('An account with this email already exists!');
                        }

                        // If not, insert the new row!
                        const { data, error: insertError } = await supabase
                            .from('test_users')
                            .insert([
                                { 
                                    name: formData.name, 
                                    email: formData.email, 
                                    password: formData.password 
                                }
                            ]);

                        if (insertError) throw insertError;

                        // Success! Save the user's email to the browser and redirect
                        localStorage.setItem('dcet_user', formData.email);
                        window.location.href = 'index.html';
                    }
                } catch (err) {
                    setError(err.message || 'Something went wrong. Please try again.');
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-50 to-indigo-50">
                    <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                        
                        <div className="bg-indigo-900 p-8 text-center">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 mb-4 ring-1 ring-white/20">
                                <TargetIcon className="text-emerald-400" size={32} />
                            </div>
                            <h1 className="text-2xl font-extrabold text-white tracking-tight">DCET Mastery Portal</h1>
                            <p className="text-indigo-200 text-sm mt-2 font-medium">Custom Database Mode</p>
                        </div>

                        <div className="p-8">
                            <div className="flex bg-slate-100 p-1 rounded-xl mb-8">
                                <button type="button" onClick={() => { setIsLogin(true); setError(''); }} 
                                    className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${isLogin ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                    Login
                                </button>
                                <button type="button" onClick={() => { setIsLogin(false); setError(''); }} 
                                    className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${!isLogin ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                    Register
                                </button>
                            </div>

                            {error && (
                                <div className="mb-6 p-3 rounded-lg bg-rose-50 text-rose-700 text-sm font-medium border border-rose-200 text-center">
                                    {error}
                                </div>
                            )}

                            <form onSubmit={handleSubmit} className="space-y-5">
                                {!isLogin && (
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Full Name</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <UserIcon className="text-slate-400" />
                                            </div>
                                            <input type="text" name="name" required={!isLogin} value={formData.name} onChange={handleInputChange}
                                                className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" 
                                                placeholder="John Doe" />
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <MailIcon className="text-slate-400" />
                                        </div>
                                        <input type="email" name="email" required value={formData.email} onChange={handleInputChange}
                                            className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" 
                                            placeholder="you@student.com" />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <LockIcon className="text-slate-400" />
                                        </div>
                                        <input type="password" name="password" required minLength="3" value={formData.password} onChange={handleInputChange}
                                            className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" 
                                            placeholder="••••••••" />
                                    </div>
                                </div>

                                <button type="submit" disabled={loading}
                                    className="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg disabled:opacity-70 flex items-center justify-center gap-2 mt-4">
                                    {loading ? 'Processing...' : (isLogin ? 'Login to Tracker' : 'Create Custom Account')}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthApp />);
    </script>
</body>
</html>
