            it_u1: {
                id: 'it_u1', category: 'it', title: "IT U1: Coding & Algorithms", shortTitle: "IT U1",
                notes: [
                    { title: "Algorithm", text: "A finite, step-by-step logical procedure written in plain English (not code) to solve a specific problem. Must have: Input, Process, Output, Start, End." },
                    { title: "Flowchart Symbols", text: "Oval/Rounded rect = Start/Stop. Parallelogram = Input/Output. Rectangle = Process/Calculation. Diamond = Decision (Yes/No). Arrow = Flow direction." },
                    { title: "Compiler vs Interpreter", text: "Compiler: Translates ENTIRE source code to machine code at once (faster execution, e.g., C, C++). Interpreter: Translates ONE LINE at a time (slower but easier to debug, e.g., Python)." },
                    { title: "Pseudocode", text: "A human-readable representation of code using plain language. Not actual code — a planning tool to map out logic before coding." },
                    { title: "IDE (Integrated Development Environment)", text: "Software for writing, testing, and debugging code. Features: code editor, compiler/interpreter, debugger. Examples: VS Code, Android Studio, Eclipse." },
                    { title: "Programming Languages by Level", text: "Machine Language: 0s and 1s. Assembly: Low-level, hardware-specific. High-level: Python, Java, C++ — human-readable, needs translation." },
                    { title: "Bug & Debugging", text: "Bug: An error in code causing incorrect behavior. Syntax error: Wrong grammar. Logic error: Wrong output. Runtime error: Crash during execution. Debugging = finding and fixing bugs." },
                    { title: "Variable & Data Types", text: "Variable: A named storage location. Common types: int (integers), float (decimals), char (single character), string (text), boolean (True/False)." }
                ],
                quiz: [
                    { id: 1, text: 'What is an "Algorithm"?', options: ['A graphical representation of logic', 'A finite step-by-step logical procedure to solve a problem', 'A programming language', 'A hardware component'], correctAnswer: 1, explanation: 'Algorithm = logical sequence of steps in plain language — written before coding.' },
                    { id: 2, text: 'In a flowchart, a Diamond symbol represents:', options: ['Start/Stop', 'Input/Output', 'Process/Calculation', 'Decision making (Yes/No branch)'], correctAnswer: 3, explanation: 'Diamond = Decision point — branches into YES or NO paths.' },
                    { id: 3, text: 'In a flowchart, a Parallelogram represents:', options: ['Start', 'Decision', 'Input or Output', 'Calculation/Process'], correctAnswer: 2, explanation: 'Parallelogram = reading input (from user/file) or printing/displaying output.' },
                    { id: 4, text: 'What does IDE stand for?', options: ['Internal Data Execution', 'Integrated Development Environment', 'Internet Design Element', 'Interactive Data Engine'], correctAnswer: 1, explanation: 'IDE combines a code editor, compiler/interpreter, and debugger in one tool.' },
                    { id: 5, text: 'What software translates code to machine language LINE-BY-LINE?', options: ['Compiler', 'Interpreter', 'Browser', 'Operating System'], correctAnswer: 1, explanation: 'Interpreters translate one line at a time (Python). Compilers do the whole file at once (C++).' },
                    { id: 6, text: 'In a flowchart, the OVAL symbol is used for:', options: ['Input/Output', 'Process', 'Decision', 'Start/Stop (Terminal)'], correctAnswer: 3, explanation: 'Oval (or rounded rectangle) = Start/Stop terminal symbols.' },
                    { id: 7, text: 'A RECTANGLE in a flowchart represents:', options: ['Start', 'Decision', 'Process/Calculation/Assignment', 'Input'], correctAnswer: 2, explanation: 'Rectangle = any processing action: calculations, assignments, function calls.' },
                    { id: 8, text: 'A "Compiler" translates code:', options: ['Line by line during execution', 'The entire source file at once before execution', 'Directly to binary without checking', 'Only for web languages'], correctAnswer: 1, explanation: 'Compiler translates the entire program, produces an executable file, then runs it.' },
                    { id: 9, text: 'Which type of error in code produces wrong results but no crash?', options: ['Syntax Error', 'Runtime Error', 'Logic Error', 'Compilation Error'], correctAnswer: 2, explanation: 'Logic errors: program runs but produces incorrect output — hardest to find.' },
                    { id: 10, text: 'Which type of error occurs due to wrong grammar/spelling in code?', options: ['Logic Error', 'Runtime Error', 'Syntax Error', 'Semantic Error'], correctAnswer: 2, explanation: 'Syntax Error: violated the language grammar rules — compiler/interpreter rejects it.' },
                    { id: 11, text: 'Pseudocode is:', options: ['Actual executable code', 'Machine language', 'Human-readable description of program logic (not real code)', 'A flowchart symbol'], correctAnswer: 2, explanation: 'Pseudocode describes algorithm logic in plain language — used for planning before coding.' },
                    { id: 12, text: 'Which programming language is Machine Language?', options: ['Python', 'Java', 'Binary (0s and 1s)', 'HTML'], correctAnswer: 2, explanation: 'Machine language = binary instructions directly understood by the CPU.' },
                    { id: 13, text: 'A "Variable" in programming is:', options: ['A fixed constant value', 'A named storage location in memory that can hold a value', 'A type of loop', 'A comment in code'], correctAnswer: 1, explanation: 'Variables store data that can change during program execution.' },
                    { id: 14, text: 'Which data type stores True or False values?', options: ['int', 'float', 'boolean', 'char'], correctAnswer: 2, explanation: 'Boolean type holds only two values: True (1) or False (0).' },
                    { id: 15, text: 'What is the FIRST step in solving any programming problem?', options: ['Writing the code', 'Testing the code', 'Understanding and clearly defining the problem', 'Drawing a flowchart'], correctAnswer: 2, explanation: 'Before any algorithm or code, you must fully understand what problem you are solving.' },
                    { id: 16, text: 'A "Runtime Error" occurs:', options: ['Before compilation', 'During compilation', 'While the program is running/executing', 'After testing'], correctAnswer: 2, explanation: 'Runtime errors crash the program during execution — e.g., dividing by zero, accessing invalid memory.' },
                    { id: 17, text: 'Which symbol connects steps in a flowchart to show direction of flow?', options: ['Rectangle', 'Diamond', 'Arrow/Line', 'Oval'], correctAnswer: 2, explanation: 'Arrows show the direction of control flow between symbols in a flowchart.' },
                    { id: 18, text: 'High-level programming languages are:', options: ['Written in binary', 'Machine-specific and very fast', 'Human-readable and need a compiler/interpreter', 'Only for supercomputers'], correctAnswer: 2, explanation: 'High-level languages (Python, Java, C++) are readable by humans but need translation to run.' },
                    { id: 19, text: '"Debugging" refers to:', options: ['Adding more features', 'Testing a new algorithm', 'The process of finding and fixing errors in code', 'Compiling code'], correctAnswer: 2, explanation: 'Debugging = systematic process of identifying, isolating, and fixing bugs.' },
                    { id: 20, text: 'The process of step-by-step thinking through a problem before coding it is called:', options: ['Debugging', 'Compilation', 'Algorithm design / Pseudocode writing', 'Execution'], correctAnswer: 2, explanation: 'Algorithm design/pseudocode is the planning stage — critical for correct and efficient code.' }
                ]
            },
            it_u2: {
                id: 'it_u2', category: 'it', title: "IT U2: HTML, CSS & JavaScript", shortTitle: "IT U2",
                notes: [
                    { title: "HTML (Structure)", text: "HyperText Markup Language. Defines the structure/content of web pages. Key tags: <h1>-<h6>=headings, <p>=paragraph, <a>=link, <img>=image, <div>=container." },
                    { title: "CSS (Style)", text: "Cascading Style Sheets. Controls visual presentation: colors, fonts, layout. Three ways: Inline, Internal (<style>), External (.css file)." },
                    { title: "JavaScript (Behavior)", text: "Adds interactivity and dynamic behavior to web pages. Runs in the browser. Variables: let/const/var. Output: console.log(). DOM manipulation." },
                    { title: "Key HTML Tags", text: "<html>: root. <head>: metadata. <body>: visible content. <table>: tables. <form>: input forms. <button>: clickable button. <ul>/<ol>: lists." },
                    { title: "HTML Attributes", text: "src: source file for <img>/<script>. href: URL for <a> links. id: unique identifier. class: group elements for styling. alt: image description." },
                    { title: "JavaScript Basics", text: "Arrays: [ ]. Objects: { key: value }. Function: function name() { }. Conditional: if/else. Loop: for, while. Event: onclick, onchange." },
                    { title: "CSS Selectors", text: "Element: p { } — targets all <p>. Class: .classname { }. ID: #idname { }. IDs are unique (use once), classes reusable (use many times)." },
                    { title: "Responsive Web Design", text: "Using CSS Media Queries to make web pages display correctly on different screen sizes (mobile, tablet, desktop)." }
                ],
                quiz: [
                    { id: 1, text: 'What does HTML stand for?', options: ['HyperText Machine Language', 'HyperText Markup Language', 'High-level Text Markup Language', 'HyperTransfer Markup Language'], correctAnswer: 1, explanation: 'HTML = HyperText Markup Language — the standard structure language for web pages.' },
                    { id: 2, text: 'Which HTML tag creates a clickable hyperlink?', options: ['<link>', '<a>', '<href>', '<hyper>'], correctAnswer: 1, explanation: '<a href="url">Link Text</a> is the anchor tag for hyperlinks.' },
                    { id: 3, text: 'What does CSS stand for?', options: ['Computer Style System', 'Creative Style Sheets', 'Cascading Style Sheets', 'Colorful Site Styling'], correctAnswer: 2, explanation: 'CSS = Cascading Style Sheets — controls the visual appearance of HTML elements.' },
                    { id: 4, text: 'In JS, which keyword is NOT used to declare a variable?', options: ['let', 'var', 'const', 'def'], correctAnswer: 3, explanation: '"def" is Python syntax. JavaScript uses let, const, and var.' },
                    { id: 5, text: 'What is the correct way to write an Array in JavaScript?', options: ['("red", "blue")', '{"red", "blue"}', '["red", "blue"]', '<"red">'], correctAnswer: 2, explanation: 'JavaScript arrays use square brackets: ["item1", "item2"].' },
                    { id: 6, text: 'In HTML, the <head> section contains:', options: ['Visible page content', 'Metadata, title, CSS links, scripts', 'Images and videos', 'Footer information'], correctAnswer: 1, explanation: '<head> contains metadata like <title>, <meta>, linked CSS/JS — not visible content.' },
                    { id: 7, text: 'What attribute specifies the URL destination of an <a> link?', options: ['src', 'href', 'link', 'url'], correctAnswer: 1, explanation: '<a href="https://...">. href = hyperlink reference.' },
                    { id: 8, text: 'What attribute specifies the source file for an <img> tag?', options: ['href', 'link', 'src', 'file'], correctAnswer: 2, explanation: '<img src="image.jpg"> — src specifies the image file path.' },
                    { id: 9, text: 'In CSS, what selector targets elements with class="highlight"?', options: ['#highlight { }', 'highlight { }', '.highlight { }', '*highlight { }'], correctAnswer: 2, explanation: 'CSS class selector uses a period: .classname { }.' },
                    { id: 10, text: 'In CSS, what selector targets the element with id="main"?', options: ['.main { }', '*main { }', '#main { }', 'id.main { }'], correctAnswer: 2, explanation: 'CSS ID selector uses a hash: #idname { }. IDs must be unique on a page.' },
                    { id: 11, text: 'JavaScript is primarily used to add:', options: ['Structure to web pages', 'Visual styling', 'Interactivity and dynamic behavior', 'Database connections directly'], correctAnswer: 2, explanation: 'JS handles events, DOM manipulation, and dynamic content — the behavior layer.' },
                    { id: 12, text: 'Which HTML tag is used for the LARGEST heading?', options: ['<h6>', '<h1>', '<head>', '<title>'], correctAnswer: 1, explanation: '<h1> is the largest heading tag. <h6> is the smallest.' },
                    { id: 13, text: 'What is the purpose of the HTML <form> tag?', options: ['Display images', 'Create tables', 'Collect user input data', 'Add styling'], correctAnswer: 2, explanation: '<form> wraps input fields to collect and submit user data to a server.' },
                    { id: 14, text: 'console.log() in JavaScript is used for:', options: ['Styling the page', 'Printing output to the browser\'s developer console', 'Saving data', 'Creating HTML elements'], correctAnswer: 1, explanation: 'console.log() is the primary debugging tool — displays values in the browser console.' },
                    { id: 15, text: 'Which tag creates an unordered (bulleted) list in HTML?', options: ['<ol>', '<ul>', '<list>', '<li>'], correctAnswer: 1, explanation: '<ul> = unordered list (bullets). <ol> = ordered list (numbered). <li> = list item.' },
                    { id: 16, text: 'CSS Media Queries are used for:', options: ['Playing music', 'Connecting to databases', 'Making responsive layouts for different screen sizes', 'Animating elements only'], correctAnswer: 2, explanation: 'Media queries apply different CSS rules based on device width, height, or orientation.' },
                    { id: 17, text: 'What is a JavaScript "function"?', options: ['A type of variable', 'A reusable block of code that performs a specific task', 'A CSS class', 'An HTML tag'], correctAnswer: 1, explanation: 'Functions are reusable code blocks: function name() { /* code */ }' },
                    { id: 18, text: 'What does the "alt" attribute in <img alt="..."> provide?', options: ['Image size', 'Image URL', 'Alternative text description for accessibility/broken images', 'Image color'], correctAnswer: 2, explanation: 'alt text displays when image fails to load and is read by screen readers for accessibility.' },
                    { id: 19, text: 'Which HTML tag creates a table row?', options: ['<td>', '<table>', '<th>', '<tr>'], correctAnswer: 3, explanation: '<tr> = table row. <td> = table data cell. <th> = table header cell.' },
                    { id: 20, text: 'The "CSS Box Model" consists of:', options: ['Content, Color, Font, Border', 'Content, Padding, Border, Margin (from inside to outside)', 'Width, Height, Color only', 'Position, Display, Float, Clear'], correctAnswer: 1, explanation: 'Box Model: Content → Padding → Border → Margin. Every HTML element is a box.' }
                ]
            },
            it_u3: {
                id: 'it_u3', category: 'it', title: "IT U3: BPA, ERP & CRM", shortTitle: "IT U3",
                notes: [
                    { title: "BPA (Business Process Automation)", text: "Using technology to automate repetitive, rule-based tasks to increase efficiency and reduce human error. Examples: email auto-routing, payroll processing." },
                    { title: "ERP (Enterprise Resource Planning)", text: "An integrated software system that connects ALL business departments (HR, Finance, Inventory, Sales) into one shared database. Examples: SAP, Oracle." },
                    { title: "CRM (Customer Relationship Management)", text: "Software to manage interactions with current and potential customers. Tracks leads, sales history, support tickets. Examples: Salesforce, HubSpot." },
                    { title: "Benefits of ERP", text: "Eliminates data silos. Real-time data sharing. Improves efficiency and accuracy. Better decision-making. Example: a purchase order in sales automatically updates inventory." },
                    { title: "Supply Chain Management (SCM)", text: "Software managing the flow of goods from raw materials to final customer: procurement → production → warehousing → delivery." },
                    { title: "MIS (Management Information System)", text: "A computer-based system that provides managers with tools for organizing and evaluating information. Helps in decision-making at all management levels." },
                    { title: "RPA (Robotic Process Automation)", text: "Software 'robots' (bots) that mimic human actions on computers to automate tasks like data entry, form filling, and report generation." },
                    { title: "Digital Transformation", text: "The process of using digital technology to fundamentally transform business processes, culture, and customer experiences." }
                ],
                quiz: [
                    { id: 1, text: 'What does BPA stand for?', options: ['Basic Programming App', 'Business Process Automation', 'Binary Processing Algorithm', 'Business Protocol Architecture'], correctAnswer: 1, explanation: 'BPA = Business Process Automation — using technology to automate repetitive work.' },
                    { id: 2, text: 'What does ERP stand for?', options: ['Electronic Record Processing', 'Enterprise Resource Planning', 'Entity Relationship Protocol', 'Economic Revenue Plan'], correctAnswer: 1, explanation: 'ERP = Enterprise Resource Planning — integrates all business departments into one system.' },
                    { id: 3, text: 'A core feature of an ERP system is:', options: ['Video game integration', 'Centralized shared database eliminating data silos', 'HTML website builder', 'Only inventory management'], correctAnswer: 1, explanation: 'ERP\'s key benefit: one central database ensures all departments see the same real-time data.' },
                    { id: 4, text: 'Which is a well-known real-world ERP system?', options: ['Adobe Photoshop', 'SAP', 'Mozilla Firefox', 'Spotify'], correctAnswer: 1, explanation: 'SAP and Oracle are the most widely used enterprise ERP platforms globally.' },
                    { id: 5, text: 'What does CRM stand for?', options: ['Customer Relationship Management', 'Code Revision Module', 'Central Resource Manager', 'Corporate Revenue Model'], correctAnswer: 0, explanation: 'CRM = Customer Relationship Management — manages client interactions and sales pipeline.' },
                    { id: 6, text: 'BPA is primarily used to automate tasks that are:', options: ['Creative and unique', 'Strategic and complex', 'Repetitive, rule-based, and routine', 'Physical manual tasks'], correctAnswer: 2, explanation: 'BPA is best for high-volume, repetitive tasks with clear rules — email routing, data entry.' },
                    { id: 7, text: 'What does SCM stand for in the IT context?', options: ['Software Code Management', 'Supply Chain Management', 'System Control Module', 'Server Client Model'], correctAnswer: 1, explanation: 'SCM = Supply Chain Management — software managing flow of goods from supplier to customer.' },
                    { id: 8, text: 'What does MIS stand for?', options: ['Management Information System', 'Manual Interface Software', 'Machine Intelligence System', 'Marketing Integration Suite'], correctAnswer: 0, explanation: 'MIS = Management Information System — provides decision support data to managers.' },
                    { id: 9, text: 'Salesforce is an example of which type of software?', options: ['ERP', 'CRM', 'BPA', 'SCM'], correctAnswer: 1, explanation: 'Salesforce is the world\'s leading CRM platform for managing customer relationships.' },
                    { id: 10, text: 'RPA (Robotic Process Automation) uses:', options: ['Physical robots', 'Software bots that mimic human computer actions to automate tasks', 'AI for complex decisions', 'ERP modules'], correctAnswer: 1, explanation: 'RPA bots automate repetitive digital tasks — clicking, copy-paste, form filling — without physical robots.' },
                    { id: 11, text: 'An advantage of ERP over separate departmental systems is:', options: ['More complex to use', 'Higher cost always', 'Real-time data sharing and elimination of duplicate data entry', 'Requires more employees'], correctAnswer: 2, explanation: 'Before ERP: Finance, HR, and Sales had separate data. ERP creates one truth.' },
                    { id: 12, text: '"Digital Transformation" refers to:', options: ['Converting paper to digital files only', 'Fundamentally transforming business processes using digital technology', 'Buying computers for staff', 'Using the internet for emails'], correctAnswer: 1, explanation: 'Digital transformation changes the entire way a business operates and delivers value using digital.' },
                    { id: 13, text: 'A CRM system would NOT typically be used to track:', options: ['Sales leads', 'Customer support tickets', 'Raw material inventory levels', 'Customer purchase history'], correctAnswer: 2, explanation: 'Inventory is tracked by ERP/SCM. CRM focuses on customer-facing data and interactions.' },
                    { id: 14, text: 'In an ERP system, when a sales order is placed, what automatically happens?', options: ['Nothing — ERP only tracks manually', 'Inventory levels update, finance records the transaction, and production is notified', 'Only sales department is notified', 'Emails are sent to customers only'], correctAnswer: 1, explanation: 'This is the power of ERP integration — one transaction triggers updates across all departments.' },
                    { id: 15, text: 'Which technology type is BEST suited to manage customer service inquiries and track sales leads?', options: ['ERP', 'CRM', 'SCM', 'MIS'], correctAnswer: 1, explanation: 'CRM is specifically designed for customer-facing activities: leads, deals, service cases.' },
                    { id: 16, text: 'Business Process Automation (BPA) leads to:', options: ['Higher human error rates', 'Increased costs always', 'Improved efficiency and reduced errors in repetitive tasks', 'Less data generated'], correctAnswer: 2, explanation: 'BPA replaces manual repetitive work with automated processes — faster, more accurate.' },
                    { id: 17, text: 'What does "data silo" mean in a business context?', options: ['A data storage tank', 'Data kept isolated within one department, inaccessible to others', 'Large database', 'Encrypted data'], correctAnswer: 1, explanation: 'Silos = isolated department databases. ERP eliminates silos with one shared database.' },
                    { id: 18, text: 'Which software category manages the flow from supplier → warehouse → customer?', options: ['CRM', 'ERP', 'SCM (Supply Chain Management)', 'BPA'], correctAnswer: 2, explanation: 'SCM = Supply Chain Management — end-to-end visibility of goods movement.' },
                    { id: 19, text: 'MIS (Management Information System) primarily helps with:', options: ['Customer management', 'Code development', 'Providing organized data to support management decision-making', 'Inventory automation'], correctAnswer: 2, explanation: 'MIS generates reports and dashboards from operational data to aid managerial decisions.' },
                    { id: 20, text: 'Which of these best describes RPA (Robotic Process Automation)?', options: ['Physical robots replacing factory workers', 'Software that automates human-like repetitive tasks on computers', 'AI that makes complex decisions', 'ERP module for HR'], correctAnswer: 1, explanation: 'RPA bots work on computers — they open apps, enter data, and perform routine digital tasks.' }
                ]
            },
            it_u4: {
                id: 'it_u4', category: 'it', title: "IT U4: Cloud Computing & IoT", shortTitle: "IT U4",
                notes: [
                    { title: "Cloud Computing Definition", text: "Delivering computing services (servers, storage, databases, networking, software) over the Internet (the 'cloud') with pay-as-you-go pricing." },
                    { title: "Three Cloud Service Models", text: "IaaS (Infrastructure as a Service): Raw servers/storage — most control. PaaS (Platform as a Service): Dev environment. SaaS (Software as a Service): Ready-to-use apps." },
                    { title: "Cloud Deployment Types", text: "Public Cloud: Shared infrastructure (AWS, Azure, Google Cloud). Private Cloud: Dedicated to one org. Hybrid Cloud: Mix of both." },
                    { title: "Advantages of Cloud", text: "No upfront hardware cost. Scalability (up/down instantly). Pay only for what you use. Disaster recovery. Access from anywhere." },
                    { title: "IoT (Internet of Things)", text: "Physical objects embedded with sensors, software, and connectivity to exchange data over the internet. Makes 'dumb' objects 'smart'." },
                    { title: "IoT Components", text: "1. Sensors/Actuators (Sensing layer). 2. Connectivity (Network layer). 3. Data Processing (Processing layer). 4. User Interface (Application layer)." },
                    { title: "Sensor vs Actuator", text: "Sensor: Collects data from environment (temperature, motion, light). Actuator: Takes physical action based on processed data (opens valve, turns on fan)." },
                    { title: "IoT Examples", text: "Smart thermostat (senses temp, controls HVAC). Fitness tracker (heart rate sensor). Smart city traffic lights. Industrial machine health monitoring." }
                ],
                quiz: [
                    { id: 1, text: 'What is Cloud Computing?', options: ['Storing data only on a local hard drive', 'Delivering computing services over the internet with pay-as-you-go pricing', 'A type of internet browser', 'A computer networking protocol'], correctAnswer: 1, explanation: 'Cloud = accessing computing resources (storage, software, servers) over the internet.' },
                    { id: 2, text: 'What does SaaS stand for?', options: ['Storage as a Service', 'Security as a Service', 'Software as a Service', 'System as a Service'], correctAnswer: 2, explanation: 'SaaS delivers complete software applications via the internet — e.g., Gmail, Netflix, Salesforce.' },
                    { id: 3, text: 'Which cloud model provides raw virtualized infrastructure (servers, storage)?', options: ['SaaS', 'PaaS', 'IaaS (Infrastructure as a Service)', 'DaaS'], correctAnswer: 2, explanation: 'IaaS = renting raw computing infrastructure. You control the OS and above.' },
                    { id: 4, text: 'What does IoT stand for?', options: ['Internet of Things', 'Intranet of Technology', 'Internal Online Transmission', 'Input Output Terminal'], correctAnswer: 0, explanation: 'IoT = Internet of Things — physical objects connected to the internet.' },
                    { id: 5, text: 'Which is an example of an IoT device?', options: ['A wooden chair', 'A smart thermostat controlled via smartphone', 'A plain notebook', 'A basic calculator'], correctAnswer: 1, explanation: 'A smart thermostat has sensors, connects to the internet, and can be remotely controlled.' },
                    { id: 6, text: 'IaaS provides:', options: ['Ready-to-use software applications', 'A development platform for building apps', 'Raw virtualized infrastructure (servers, storage, networking)', 'Only database services'], correctAnswer: 2, explanation: 'IaaS = lowest cloud layer. You get compute, storage, and network. You manage everything above.' },
                    { id: 7, text: 'PaaS (Platform as a Service) is primarily used by:', options: ['End users for browsing', 'Software developers to build, test, and deploy applications', 'Hardware manufacturers', 'Network engineers only'], correctAnswer: 1, explanation: 'PaaS provides a development platform — developers get tools, runtime, and middleware without managing infrastructure.' },
                    { id: 8, text: 'Google Drive is an example of which cloud service?', options: ['IaaS', 'PaaS', 'SaaS', 'Private Cloud'], correctAnswer: 2, explanation: 'Google Drive is a ready-to-use application delivered over the internet = SaaS.' },
                    { id: 9, text: 'What is a key advantage of Cloud Computing for startups?', options: ['They must buy expensive physical servers', 'No internet required', 'Pay-as-you-go scalability without large upfront hardware investment', 'Completely unhackable'], correctAnswer: 2, explanation: 'Startups can launch with zero hardware cost and scale cloud resources as they grow.' },
                    { id: 10, text: 'In an IoT system, what does a "Sensor" do?', options: ['Performs a physical action', 'Stores data permanently', 'Collects data from the physical environment', 'Provides internet access'], correctAnswer: 2, explanation: 'Sensors detect physical phenomena — temperature, motion, humidity, pressure — and convert to digital data.' },
                    { id: 11, text: 'What is an "Actuator" in an IoT system?', options: ['A sensor that measures temperature', 'A device that takes physical action based on a signal (e.g., opens a valve)', 'A cloud server', 'A network router'], correctAnswer: 1, explanation: 'Actuator = the "hands" of IoT. It does something in the physical world based on data.' },
                    { id: 12, text: 'Which cloud deployment type is shared infrastructure available to general public?', options: ['Private Cloud', 'Community Cloud', 'Public Cloud', 'Hybrid Cloud'], correctAnswer: 2, explanation: 'Public Cloud = AWS, Azure, Google Cloud. Shared by many organizations, managed by provider.' },
                    { id: 13, text: 'A "Hybrid Cloud" deployment means:', options: ['Only private servers', 'Only public cloud', 'Combination of private and public cloud', 'No cloud at all'], correctAnswer: 2, explanation: 'Hybrid cloud mixes private (for sensitive data) and public cloud (for scalable workloads).' },
                    { id: 14, text: 'The four core components of an IoT system are:', options: ['CPU, RAM, Storage, Network', 'Sensors, Connectivity, Data Processing, User Interface', 'Input, Processing, Output, Storage', 'Hardware, Software, Data, People'], correctAnswer: 1, explanation: 'IoT stack: Sensing (sensors) → Network (connectivity) → Processing (analysis) → Application (UI).' },
                    { id: 15, text: 'AWS (Amazon Web Services) is an example of:', options: ['Private Cloud', 'IaaS and PaaS Public Cloud provider', 'Only SaaS services', 'On-premise servers'], correctAnswer: 1, explanation: 'AWS is the world\'s largest public cloud provider offering IaaS, PaaS, and SaaS services.' },
                    { id: 16, text: 'Why are losses in IoT systems possible?', options: ['Sensors are always 100% accurate', 'Network connectivity can fail and sensors can malfunction', 'IoT is completely offline', 'No processing is needed'], correctAnswer: 1, explanation: 'IoT systems depend on network connectivity and sensor reliability — both can fail.' },
                    { id: 17, text: 'Sensors in IoT are described as the "eyes" of the system. What are actuators called?', options: ['The brain', 'The ears', 'The hands', 'The memory'], correctAnswer: 2, explanation: 'If sensors are eyes (observe), actuators are hands (act/do something physically).' },
                    { id: 18, text: 'What distinguishes a "Smart" device from a regular device?', options: ['It is more expensive', 'It is connected to the internet and can send/receive data', 'It is made of metal', 'It has a touchscreen'], correctAnswer: 1, explanation: 'A device becomes "smart" when it is internet-connected and can exchange data autonomously.' },
                    { id: 19, text: 'Which cloud model offers the MOST control to the user?', options: ['SaaS (least control)', 'PaaS (moderate control)', 'IaaS (most control)', 'All offer same control'], correctAnswer: 2, explanation: 'IaaS gives raw infrastructure — user controls OS, middleware, and applications. Most customizable.' },
                    { id: 20, text: 'A fitness band that tracks heart rate and sends data to your phone is an example of:', options: ['Cloud Computing only', 'IoT (sensor device connected to internet)', 'PaaS application', 'A local area network device'], correctAnswer: 1, explanation: 'Fitness bands have biosensors, connect wirelessly, and share data to cloud/app — classic IoT.' }
                ]
            },
            it_u5: {
                id: 'it_u5', category: 'it', title: "IT U5: Cyber Security", shortTitle: "IT U5",
                notes: [
                    { title: "Phishing", text: "Fraudulent emails/links/messages impersonating legitimate organizations to steal credentials. Tip: Always verify sender address, never click suspicious links." },
                    { title: "DoS vs DDoS Attack", text: "DoS (Denial of Service): Single source floods server with traffic to make it crash. DDoS (Distributed DoS): Multiple systems (botnet) attack simultaneously — harder to stop." },
                    { title: "Malware Types", text: "Virus: Attaches to files. Worm: Self-replicates, spreads via network. Trojan: Disguised as legitimate software. Ransomware: Encrypts data, demands payment. Spyware: Monitors activity." },
                    { title: "Encryption", text: "Converting data into an unreadable format (ciphertext) that can only be decoded with a key. Symmetric: same key to encrypt/decrypt. Asymmetric (Public Key): different keys." },
                    { title: "Firewall", text: "A network security system that monitors and filters incoming/outgoing network traffic based on predefined security rules. Acts as a barrier between trusted and untrusted networks." },
                    { title: "Authentication Methods", text: "Password (weakest). Two-Factor Authentication (2FA): something you know + something you have (OTP). Biometrics: fingerprint, face recognition (strongest)." },
                    { title: "SSL/HTTPS", text: "SSL/TLS encrypts data between browser and server. HTTPS (HyperText Transfer Protocol Secure) = HTTP + SSL. Look for padlock icon in browser — data is encrypted." },
                    { title: "Social Engineering", text: "Manipulating people (not computers) into revealing confidential information. Phishing, Vishing (phone), Baiting, Pretexting. Human firewall is the best defense." }
                ],
                quiz: [
                    { id: 1, text: 'What is "Phishing"?', options: ['Fishing for data in databases', 'Fraudulent emails/messages impersonating trusted sources to steal credentials', 'A network attack using traffic floods', 'Malware that encrypts files'], correctAnswer: 1, explanation: 'Phishing tricks users into revealing passwords by pretending to be a trusted entity.' },
                    { id: 2, text: 'A DoS (Denial of Service) attack works by:', options: ['Stealing user passwords', 'Flooding a server with traffic to make it unavailable', 'Installing keyloggers', 'Breaking encryption'], correctAnswer: 1, explanation: 'DoS floods a server with requests until it is overwhelmed and crashes.' },
                    { id: 3, text: 'What type of malware disguises itself as legitimate software?', options: ['Virus', 'Worm', 'Trojan Horse', 'Ransomware'], correctAnswer: 2, explanation: 'Trojans trick users into installing them by appearing to be useful software.' },
                    { id: 4, text: 'Ransomware attacks work by:', options: ['Spying on user activity', 'Encrypting victim\'s files and demanding payment for decryption key', 'Flooding servers', 'Stealing passwords only'], correctAnswer: 1, explanation: 'Ransomware holds your files "hostage" — demands cryptocurrency payment to restore access.' },
                    { id: 5, text: 'What does a Firewall do?', options: ['Stores passwords securely', 'Monitors and filters network traffic based on security rules', 'Encrypts hard drive data', 'Provides VPN access'], correctAnswer: 1, explanation: 'Firewall = network gatekeeper. Blocks unauthorized traffic based on rules.' },
                    { id: 6, text: 'HTTPS differs from HTTP because it:', options: ['Is faster', 'Uses fewer resources', 'Encrypts data between browser and server (uses SSL/TLS)', 'Only works for email'], correctAnswer: 2, explanation: 'HTTPS = HTTP + SSL/TLS encryption. Data in transit is secured against eavesdropping.' },
                    { id: 7, text: 'Two-Factor Authentication (2FA) requires:', options: ['Two passwords', 'Something you know + something you have (OTP)', 'Two different usernames', 'Two biometrics'], correctAnswer: 1, explanation: '2FA adds a second verification layer (OTP sent to phone) beyond just a password.' },
                    { id: 8, text: 'A computer "Worm" is different from a Virus because it:', options: ['Is less dangerous', 'Only affects mobile devices', 'Self-replicates and spreads across networks without human action', 'Requires a host file'], correctAnswer: 2, explanation: 'Worms spread autonomously through networks. Viruses need a host file and human action.' },
                    { id: 9, text: '"Social Engineering" attacks target:', options: ['Computer hardware vulnerabilities', 'Software bugs', 'Human psychology to trick people into revealing information', 'Network protocols'], correctAnswer: 2, explanation: 'Social engineering exploits human trust, not technical vulnerabilities.' },
                    { id: 10, text: 'What is "Encryption" in cybersecurity?', options: ['Deleting sensitive files', 'Making a copy of data', 'Converting data into unreadable format using a key (for security)', 'Compressing data files'], correctAnswer: 2, explanation: 'Encryption scrambles data so only authorized parties with the key can read it.' },
                    { id: 11, text: 'SSL stands for:', options: ['Safe Secure Layer', 'Secure Sockets Layer', 'System Security Language', 'Server Side Loading'], correctAnswer: 1, explanation: 'SSL = Secure Sockets Layer — creates an encrypted link between client and server.' },
                    { id: 12, text: 'Spyware is designed to:', options: ['Destroy files', 'Encrypt data for ransom', 'Secretly monitor user activity and steal information', 'Replicate through networks'], correctAnswer: 2, explanation: 'Spyware silently collects browsing history, keystrokes, and credentials.' },
                    { id: 13, text: 'The most secure authentication method is:', options: ['Weak password', 'Strong password alone', 'Password + 2FA', 'No authentication (public access)'], correctAnswer: 2, explanation: 'Multi-factor authentication combining what you know + what you have is strongest.' },
                    { id: 14, text: 'DDoS differs from DoS because:', options: ['DDoS is less harmful', 'DDoS uses a single computer', 'DDoS uses many systems (botnet) making it much harder to stop', 'DDoS targets files, DoS targets servers'], correctAnswer: 2, explanation: 'DDoS uses thousands of compromised machines simultaneously — the scale makes it devastating.' },
                    { id: 15, text: '"Vishing" is a social engineering attack via:', options: ['Email', 'Social media', 'Voice/Phone calls', 'Malicious USB drives'], correctAnswer: 2, explanation: 'Vishing = Voice Phishing. Attackers call and impersonate banks or IT support.' },
                    { id: 16, text: 'A "Botnet" is:', options: ['A type of firewall', 'A collection of compromised computers controlled remotely for attacks', 'A network of IoT sensors', 'A secure VPN network'], correctAnswer: 1, explanation: 'Botnets = armies of "zombie" computers infected by malware and remotely controlled by attackers.' },
                    { id: 17, text: '"Symmetric Encryption" means:', options: ['Two different keys for encrypt and decrypt', 'The same key is used for both encrypting and decrypting', 'No key is needed', 'Keys are shared publicly'], correctAnswer: 1, explanation: 'Symmetric encryption uses one shared secret key. Faster but key sharing is risky.' },
                    { id: 18, text: 'The padlock icon in a browser address bar indicates:', options: ['The page is loading', 'The connection is encrypted (HTTPS/SSL)', 'The site is blocked', 'You are logged in'], correctAnswer: 1, explanation: 'Padlock = HTTPS active. Your data is encrypted in transit between your browser and the server.' },
                    { id: 19, text: 'A "Strong Password" should include:', options: ['Only letters for ease of remembering', 'Your name and birthdate', 'Mix of uppercase, lowercase, numbers, and symbols with 12+ characters', 'Simple words'], correctAnswer: 2, explanation: 'Strong passwords are long and complex — harder to brute-force guess.' },
                    { id: 20, text: 'What is the BEST defense against Social Engineering attacks?', options: ['Better antivirus software', 'Stronger passwords', 'Educating users to be skeptical and verify identities (human firewall)', 'Better encryption'], correctAnswer: 2, explanation: 'Since social engineering targets humans, training and awareness (human firewall) is the key defense.' }
                ]
            }
        };

        function App() {
            const [selectedCategory, setSelectedCategory] = useState('math');
            const firstUnitKey = Object.keys(SUBJECT_DATA)[0] || '';
            const [selectedUnitId, setSelectedUnitId] = useState(firstUnitKey);
            const [mode, setMode] = useState('notes'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [expandedCategory, setExpandedCategory] = useState('math');
            
            const [progress, setProgress] = useState(() => {
                try {
                    const saved = localStorage.getItem('dcet_practice_progress_v2');
                    return saved ? JSON.parse(saved) : {};
                } catch(e) { return {}; }
            });

            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);

            useEffect(() => {
                const unitProgress = progress[selectedUnitId] || {};
                setAnswers(unitProgress.answers || {});
                setSubmitted(unitProgress.submitted || false);
            }, [selectedUnitId, progress]);

            const saveProgress = (unitId, newAnswers, isSubmitted) => {
                const newProgress = {
                    ...progress,
                    [unitId]: { answers: newAnswers, submitted: isSubmitted }
                };
                setProgress(newProgress);
                try { 
                    localStorage.setItem('dcet_practice_progress_v2', JSON.stringify(newProgress)); 
                } catch(e) { }
            };

            const handleUnitSelect = (unitId, categoryId) => {
                setSelectedCategory(categoryId);
                setSelectedUnitId(unitId);
                setMode('notes');
                setIsSidebarOpen(false);
                const mainContent = document.getElementById('main-scroll-area');
                if (mainContent) mainContent.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAnswer = (qId, optIdx) => {
                if (!submitted) {
                    const newAnswers = { ...answers, [qId]: optIdx };
                    setAnswers(newAnswers);
                    saveProgress(selectedUnitId, newAnswers, false);
                }
            };

            const handleSubmitQuiz = () => {
                setSubmitted(true);
                saveProgress(selectedUnitId, answers, true);
                const mainContent = document.getElementById('main-scroll-area');
                if (mainContent) mainContent.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const resetQuiz = () => {
                setAnswers({});
                setSubmitted(false);
                saveProgress(selectedUnitId, {}, false);
            };
            
            const clearAllProgress = () => {
                if (confirm("Reset ALL progress across all units? This cannot be undone.")) {
                    localStorage.removeItem('dcet_practice_progress_v2');
                    setProgress({});
                    setAnswers({});
                    setSubmitted(false);
                }
            };

            const currentData = SUBJECT_DATA[selectedUnitId];
            if (!currentData) return <div className="p-8 text-center"><h1 className="text-2xl font-bold text-red-600">Database Missing</h1></div>;

            const theme = THEMES[currentData.category] || THEMES['math'];
            const totalQ = currentData.quiz ? currentData.quiz.length : 0;
            const score = submitted ? currentData.quiz.filter(q => answers[q.id] === q.correctAnswer).length : 0;
            const totalUnits = Object.keys(SUBJECT_DATA).length;
            const completedUnits = Object.values(progress).filter(p => p.submitted).length;
            const progressPercent = Math.round((completedUnits / totalUnits) * 100) || 0;

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 selection:bg-indigo-100">
                    {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)}></div>}

                    <aside className={`fixed lg:static inset-y-0 left-0 w-[280px] bg-[#0f172a] text-slate-300 flex flex-col z-50 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'} shadow-2xl lg:shadow-none`}>
                        <div className="p-5 border-b border-slate-800 shrink-0 flex justify-between items-center bg-[#0b1120]">
                            <div>
                                <h1 className="text-lg font-extrabold text-white tracking-tight flex items-center gap-2">
                                    <AwardIcon className="text-indigo-400" size={20} /> DCET Portal
                                </h1>
                            </div>
                            <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden text-slate-400 hover:text-white p-1"><XIcon size={20} /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto sidebar-scroll p-3 space-y-1">
                            {CATEGORIES.map(cat => {
                                const catTheme = THEMES[cat.id] || THEMES['math'];
                                const catUnits = Object.values(SUBJECT_DATA).filter(u => u.category === cat.id);
                                const isExpanded = expandedCategory === cat.id;
                                return (
                                    <div key={cat.id} className="mb-1">
                                        <button onClick={() => setExpandedCategory(isExpanded ? null : cat.id)} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-bold transition-colors ${isExpanded ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'}`}>
                                            <div className="flex items-center gap-2.5"><span className={catTheme.color}>{catTheme.icon}</span>{cat.name}</div>
                                            <div className={`transition-transform duration-200 ${isExpanded ? 'rotate-180 text-white' : 'text-slate-500'}`}><ChevronDownIcon /></div>
                                        </button>
                                        {isExpanded && (
                                            <div className="mt-1 mb-2 ml-4 pl-3 border-l border-slate-700 space-y-0.5">
                                                {catUnits.map(unit => {
                                                    const isSelected = selectedUnitId === unit.id;
                                                    const isDone = progress[unit.id]?.submitted;
                                                    return (
                                                        <button key={unit.id} onClick={() => handleUnitSelect(unit.id, cat.id)} className={`w-full flex items-center justify-between px-3 py-2 rounded-md text-sm font-medium transition-all ${isSelected ? `bg-slate-800 ${catTheme.color}` : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'}`}>
                                                            <span className="truncate pr-2">{unit.shortTitle || unit.title}</span>
                                                            {isDone && <CheckCircleIcon size={14} className={isSelected ? catTheme.color : "text-emerald-500 opacity-70"} />}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <div className="p-4 border-t border-slate-800 shrink-0">
                            <button onClick={clearAllProgress} className="w-full py-2.5 rounded-lg bg-slate-800/50 text-xs text-slate-400 font-bold flex justify-center gap-2 border border-slate-700/50"><TrashIcon /> Reset Data</button>
                        </div>
                    </aside>

                    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-white lg:border-l border-slate-200 relative z-10">
                        <div className="h-16 border-b border-slate-200 flex items-center justify-between px-4 sm:px-8 bg-white/80 sticky top-0 shrink-0">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-1.5 -ml-1.5 text-slate-500 rounded-md"><MenuIcon /></button>
                                <a href="index.html" className="flex items-center gap-1 text-xs font-bold text-slate-500 hover:text-indigo-600 transition-colors mr-2 px-2 py-1 bg-slate-100 rounded-md">← TRACKER</a>
                                <div className="hidden sm:flex items-center gap-2 text-sm font-semibold text-slate-400 border-l border-slate-200 pl-3">
                                    <span className={theme.color}>{CATEGORIES.find(c => c.id === currentData.category)?.name}</span><ChevronRightIcon /><span className="text-slate-800">{currentData.shortTitle || currentData.title}</span>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200 shrink-0">
                                <button onClick={() => setMode('notes')} className={`px-4 py-1.5 rounded-md text-xs sm:text-sm font-bold ${mode === 'notes' ? `bg-white text-slate-800 shadow-sm ring-1 ring-slate-200/50` : 'text-slate-500'}`}>Cards</button>
                                <button onClick={() => setMode('quiz')} className={`px-4 py-1.5 rounded-md text-xs sm:text-sm font-bold ${mode === 'quiz' ? `bg-white text-slate-800 shadow-sm ring-1 ring-slate-200/50` : 'text-slate-500'}`}>Quizzes</button>
                            </div>
                        </div>

                        <div id="main-scroll-area" className="flex-1 overflow-y-auto bg-slate-50/50">
                            <div className="max-w-4xl mx-auto px-4 sm:px-8 py-8 sm:py-12">
                                <div className="mb-10">
                                    <div className={`inline-flex items-center justify-center w-12 h-12 rounded-xl ${theme.light} ${theme.color} mb-4 ring-1 ${theme.border}`}>{theme.icon}</div>
                                    <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">{currentData.title}</h2>
                                </div>

                                {mode === 'notes' && (
                                    <div className="space-y-6 animate-in fade-in duration-500">
                                        <div className="grid gap-4 sm:grid-cols-2">
                                            {currentData.notes && currentData.notes.map((note, idx) => (
                                                <div key={idx} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 relative overflow-hidden">
                                                    <div className={`absolute top-0 left-0 w-1.5 h-full ${theme.solid} opacity-70`}></div>
                                                    <h3 className={`font-bold text-lg mb-2.5 ${theme.color}`}>{note.title}</h3>
                                                    <p className="text-slate-600 text-sm sm:text-base">{note.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-10 flex justify-end">
                                            <button onClick={() => setMode('quiz')} className={`flex items-center gap-2 ${theme.bg} text-white px-8 py-4 rounded-xl font-extrabold shadow-lg`}>Start Practice Quiz <ChevronRightIcon size={20} /></button>
                                        </div>
                                    </div>
                                )}

                                {mode === 'quiz' && (
                                    <div className="animate-in fade-in duration-500 max-w-3xl">
                                        {submitted && (
                                            <div className={`mb-10 p-8 rounded-3xl text-center border-2 ${score >= totalQ * 0.7 ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                                                <h3 className="text-6xl font-black text-slate-800 mb-2">{score} <span className="text-3xl text-slate-400">/ {totalQ}</span></h3>
                                                <button onClick={resetQuiz} className="bg-white text-slate-800 ring-1 ring-slate-200 px-6 py-2.5 rounded-lg font-bold">Retake Quiz</button>
                                            </div>
                                        )}

                                        <div className="space-y-10">
                                            {currentData.quiz && currentData.quiz.map((q, qIndex) => (
                                                <div key={q.id} className="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm relative">
                                                    <div className={`absolute -left-3 -top-3 w-8 h-8 rounded-full ${theme.bg} text-white flex items-center justify-center font-bold text-sm shadow-sm ring-4 ring-slate-50`}>{qIndex + 1}</div>
                                                    <p className="font-bold text-slate-800 text-lg mb-5 ml-2">{q.text}</p>
                                                    <div className="space-y-2.5">
                                                        {q.options.map((option, optIdx) => {
                                                            const isSelected = answers[q.id] === optIdx;
                                                            const isCorrect = optIdx === q.correctAnswer;
                                                            let btnStyle = "border-slate-200 text-slate-600 bg-white";
                                                            if (submitted) {
                                                                if (isCorrect) btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-900 font-bold ring-1 ring-emerald-500";
                                                                else if (isSelected && !isCorrect) btnStyle = "border-rose-300 bg-rose-50 text-rose-900 font-semibold";
                                                                else btnStyle = "border-slate-100 opacity-40 bg-slate-50";
                                                            } else if (isSelected) btnStyle = `${theme.border} ${theme.light} ${theme.color} ring-1 ${theme.ring} font-bold`;

                                                            return (
                                                                <button key={optIdx} onClick={() => handleAnswer(q.id, optIdx)} disabled={submitted} className={`w-full text-left p-4 rounded-xl border-2 flex items-center gap-4 ${btnStyle}`}>
                                                                    <div className="flex-shrink-0">
                                                                        {submitted && isCorrect && <CheckCircleIcon size={22} className="text-emerald-600" />}
                                                                        {submitted && isSelected && !isCorrect && <XCircleIcon size={22} className="text-rose-500" />}
                                                                        {!submitted && <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${isSelected ? theme.border : 'border-slate-300'}`}>{isSelected && <div className={`w-2.5 h-2.5 rounded-full ${theme.solid}`} />}</div>}
                                                                    </div>
                                                                    <span className="text-[15px]">{option}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                    {submitted && (
                                                        <div className="mt-5 p-4 rounded-xl text-sm border flex gap-3 bg-slate-50 text-slate-700 border-slate-200">
                                                            <span className="text-lg leading-none shrink-0">{answers[q.id] === q.correctAnswer ? '✨' : '📘'}</span>
                                                            <div>
                                                                <strong className="block mb-0.5 font-bold">{answers[q.id] === q.correctAnswer ? 'Correct!' : 'Explanation'}</strong>
                                                                <span className="leading-relaxed opacity-90">{q.explanation}</span>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        {!submitted && (
                                            <div className="mt-8 pt-6 border-t border-slate-200 flex items-center justify-between">
                                                <p className="text-slate-500 text-sm font-semibold">{Object.keys(answers).length} of {totalQ} answered</p>
                                                <button onClick={handleSubmitQuiz} disabled={Object.keys(answers).length !== totalQ} className={`w-full sm:w-auto ${theme.bg} text-white px-10 py-3.5 rounded-xl font-bold disabled:opacity-40`}>Submit Answers</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
