                    {/* Footer Stats */}
                    <footer className="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 text-center py-3 px-4 z-20">
                        <p className="text-slate-400 text-xs font-bold uppercase tracking-wider">
                            Showing <span className="text-white">{filtered.length}</span> cards · <span className="text-white">{filtered.reduce((total, section) => total + section.formulas.length, 0)}</span> formulas total
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FormulasApp />);
    </script>
</body>
</html>
